version: '3.8'

services:
  waba-app:
    build:
      context: .
      args:
        - VITE_META_ACCESS_TOKEN=${VITE_META_ACCESS_TOKEN}
        - VITE_META_PHONE_NUMBER_ID=${VITE_META_PHONE_NUMBER_ID}
        - VITE_META_WABA_ID=${VITE_META_WABA_ID}
        - VITE_META_APP_ID=${VITE_META_APP_ID}
    ports:
      - "3000:3000"
    restart: unless-stopped
